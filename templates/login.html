<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Terracotta Painting</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    body {
      background-color: var(--co-sand);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 1rem;
    }
    
    .login-container {
      width: 100%;
      max-width: 420px;
      background-color: var(--co-white);
      padding: 3rem 2.5rem;
      border-radius: 40px 8px 40px 8px; /* Wheeler & Watkins asymmetric curve */
      box-shadow: 0 10px 40px rgba(58, 63, 65, 0.06);
      border: 1px solid rgba(58, 63, 65, 0.03);
      text-align: center;
    }
    
    .login-logo {
      height: 90px;
      width: auto;
      margin: 0 auto 1.5rem;
      mix-blend-mode: multiply;
      display: block;
    }
    
    .login-title {
      font-family: var(--font-display);
      color: var(--co-slate);
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }
    
    .login-subtitle {
      font-size: 0.85rem;
      color: rgba(58, 63, 65, 0.6);
      margin-bottom: 2rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }
    
    .form-label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 500;
      color: var(--co-slate);
      margin-bottom: 0.5rem;
    }
    
    .form-control {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1px solid rgba(58, 63, 65, 0.12);
      background-color: #FAFAFA;
      border-radius: 12px 4px 12px 4px;
      font-family: var(--font-body);
      font-weight: 300;
      transition: var(--transition-smooth);
    }
    
    .form-control:focus {
      border-color: var(--co-terracotta);
      background-color: var(--co-white);
      box-shadow: 0 0 0 3px rgba(192, 90, 62, 0.1);
    }
    
    .login-btn {
      width: 100%;
      background-color: var(--co-terracotta);
      color: var(--co-white);
      padding: 1rem;
      font-size: 0.9rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      border-radius: 20px 4px 20px 4px;
      border: none;
      transition: var(--transition-smooth);
      margin-top: 1rem;
    }
    
    .login-btn:hover {
      background-color: var(--co-slate);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(58, 63, 65, 0.15);
    }
    
    .error-box {
      background-color: rgba(192, 90, 62, 0.08);
      color: var(--co-terracotta);
      border-left: 3px solid var(--co-terracotta);
      padding: 0.8rem;
      font-size: 0.85rem;
      border-radius: 4px;
      margin-bottom: 1.5rem;
      text-align: left;
    }
    
    .back-home {
      display: inline-block;
      margin-top: 2rem;
      font-size: 0.8rem;
      color: rgba(58, 63, 65, 0.5);
      border-bottom: 1px solid transparent;
      transition: var(--transition-smooth);
    }
    
    .back-home:hover {
      color: var(--co-terracotta);
      border-bottom-color: var(--co-terracotta);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <img src="/static/assets/images/logo.png" alt="Terracotta Painting Logo" class="login-logo">
    <h1 class="login-title">Administrative Portal</h1>
    <p class="login-subtitle">Sign in to manage projects, hours, and finances.</p>
    
    {% if error %}
      <div class="error-box" role="alert">
        {{ error }}
      </div>
    {% endif %}
    
    <form method="POST" action="/admin/login">
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input type="text" id="username" name="username" class="form-control" placeholder="Enter username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      
      <button type="submit" class="login-btn">Secure Login</button>
    </form>
    
    <a href="/" class="back-home">&larr; Return to main site</a>
  </div>

</body>
</html>
